<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>访问来源检测 Demo</title>
</head>
<body>
  <h2>访问来源检测</h2>

  <div id="result"></div>

  <script>
    const referrer = document.referrer;

    if (!referrer) {
      document.getElementById("result").innerHTML =
        "❌ 当前是【地址栏直接访问 / 粘贴访问】";
    } else {
      document.getElementById("result").innerHTML =
        "✅ 当前是【点击进入】<br>来源：" + referrer;
    }

    console.log("Referrer:", referrer);
  </script>
</body>
</html>
